name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tbt-admin
    outputs:
      backend_changed: ${{ steps.filter.outputs.backend }}
      admin_changed: ${{ steps.filter.outputs.admin }}
      userweb_changed: ${{ steps.filter.outputs.userweb }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'tbt-admin/backend/**'
              - 'tbt-admin/package*.json'
            admin:
              - 'tbt-admin/admin-panel/**'
              - 'tbt-admin/package*.json'
            userweb:
              - 'tbt-user-web/**'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tbt-admin/package-lock.json

      - name: Install Dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Build Backend
        run: npm run build:backend

      - name: Build Admin Panel
        run: npm run build:admin

  deploy-backend:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && needs.build-and-test.outputs.backend_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy tbt-backend \
            --source tbt-admin/backend \
            --region asia-south1 \
            --project tbt-lms-platform \
            --quiet

  deploy-admin:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && needs.build-and-test.outputs.admin_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: tbt-admin/admin-panel

  deploy-user-web:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && needs.build-and-test.outputs.userweb_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_USER_WEB_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: tbt-user-web
